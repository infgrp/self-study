{% extends "base.html" %}
{% block title %}회원가입 - 자율학습 관리{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">회원가입</h3>
                <form method="POST" id="registerForm">
                    <div class="mb-3">
                        <label for="username" class="form-label">아이디</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">비밀번호</label>
                        <input type="password" class="form-control" id="password" name="password" required
                               minlength="8" onkeyup="checkPassword()">
                        <div class="form-text">
                            <ul class="mb-0 ps-3 small">
                                <li id="rule-length" class="text-muted">8자 이상</li>
                                <li id="rule-letter" class="text-muted">영문자 포함</li>
                                <li id="rule-number" class="text-muted">숫자 포함</li>
                            </ul>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="password_confirm" class="form-label">비밀번호 확인</label>
                        <input type="password" class="form-control" id="password_confirm" name="password_confirm" required
                               onkeyup="checkPasswordMatch()">
                        <div id="password-match-msg" class="form-text"></div>
                    </div>
                    <div class="mb-3">
                        <label for="name" class="form-label">이름</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">역할</label>
                        <div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="role" id="roleStudent" value="student" checked>
                                <label class="form-check-label" for="roleStudent">학생</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="role" id="roleTeacher" value="teacher">
                                <label class="form-check-label" for="roleTeacher">교사</label>
                            </div>
                        </div>
                    </div>
                    <!-- 교사 전용 필드 -->
                    <div id="teacherFields" style="display: none;">
                        <div class="mb-3">
                            <label for="assigned_grade" class="form-label">담당 학년</label>
                            <select class="form-select" id="assigned_grade" name="assigned_grade">
                                <option value="">선택 안 함 (전체)</option>
                                <option value="1">1학년</option>
                                <option value="2">2학년</option>
                                <option value="3">3학년</option>
                            </select>
                            <div class="form-text">담당 학년을 선택하면 해당 학년 학생들만 관리할 수 있습니다.</div>
                        </div>
                    </div>
                    <!-- 학생 전용 필드 -->
                    <div id="studentFields">
                        <div class="mb-3">
                            <label for="student_id" class="form-label">학번</label>
                            <input type="text" class="form-control" id="student_id" name="student_id"
                                   maxlength="5" pattern="\d{5}" placeholder="예: 10101"
                                   inputmode="numeric">
                            <div class="form-text">
                                숫자 5자리로 입력하세요.
                                입학년도가 포함된 학번(예: <strong>2024</strong>-10101)은
                                뒤 5자리(<strong>10101</strong>)만 입력합니다.
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">성별</label>
                            <div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" id="genderM" value="M" checked>
                                    <label class="form-check-label" for="genderM">남</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" id="genderF" value="F">
                                    <label class="form-check-label" for="genderF">여</label>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label for="grade" class="form-label">학년</label>
                                <select class="form-select" id="grade" name="grade">
                                    <option value="1">1학년</option>
                                    <option value="2">2학년</option>
                                    <option value="3">3학년</option>
                                </select>
                            </div>
                            <div class="col-6 mb-3">
                                <label for="class_num" class="form-label">반</label>
                                <select class="form-select" id="class_num" name="class_num">
                                    {% for i in range(1, 11) %}
                                    <option value="{{ i }}">{{ i }}반</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">가입하기</button>
                </form>
                <hr>
                <p class="text-center mb-0">
                    이미 계정이 있으신가요? <a href="{{ url_for('auth.login') }}">로그인</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// 역할 선택에 따른 필드 표시/숨김
document.querySelectorAll('input[name="role"]').forEach(radio => {
    radio.addEventListener('change', function() {
        document.getElementById('studentFields').style.display =
            this.value === 'student' ? 'block' : 'none';
        document.getElementById('teacherFields').style.display =
            this.value === 'teacher' ? 'block' : 'none';
    });
});

// 비밀번호 규칙 검사
function checkPassword() {
    const password = document.getElementById('password').value;

    // 길이 검사
    const ruleLength = document.getElementById('rule-length');
    if (password.length >= 8) {
        ruleLength.className = 'text-success';
        ruleLength.innerHTML = '8자 이상 ✓';
    } else {
        ruleLength.className = 'text-muted';
        ruleLength.innerHTML = '8자 이상';
    }

    // 영문자 검사
    const ruleLetter = document.getElementById('rule-letter');
    if (/[a-zA-Z]/.test(password)) {
        ruleLetter.className = 'text-success';
        ruleLetter.innerHTML = '영문자 포함 ✓';
    } else {
        ruleLetter.className = 'text-muted';
        ruleLetter.innerHTML = '영문자 포함';
    }

    // 숫자 검사
    const ruleNumber = document.getElementById('rule-number');
    if (/[0-9]/.test(password)) {
        ruleNumber.className = 'text-success';
        ruleNumber.innerHTML = '숫자 포함 ✓';
    } else {
        ruleNumber.className = 'text-muted';
        ruleNumber.innerHTML = '숫자 포함';
    }

    checkPasswordMatch();
}

// 비밀번호 일치 검사
function checkPasswordMatch() {
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('password_confirm').value;
    const msg = document.getElementById('password-match-msg');

    if (confirm === '') {
        msg.innerHTML = '';
        msg.className = 'form-text';
    } else if (password === confirm) {
        msg.innerHTML = '비밀번호가 일치합니다 ✓';
        msg.className = 'form-text text-success';
    } else {
        msg.innerHTML = '비밀번호가 일치하지 않습니다';
        msg.className = 'form-text text-danger';
    }
}

// 폼 제출 전 검사
document.getElementById('registerForm').addEventListener('submit', function(e) {
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('password_confirm').value;

    if (password.length < 8) {
        e.preventDefault();
        alert('비밀번호는 8자 이상이어야 합니다.');
        return;
    }

    if (!/[a-zA-Z]/.test(password)) {
        e.preventDefault();
        alert('비밀번호에 영문자가 포함되어야 합니다.');
        return;
    }

    if (!/[0-9]/.test(password)) {
        e.preventDefault();
        alert('비밀번호에 숫자가 포함되어야 합니다.');
        return;
    }

    if (password !== confirm) {
        e.preventDefault();
        alert('비밀번호가 일치하지 않습니다.');
        return;
    }

    // 학생 학번 검사
    const role = document.querySelector('input[name="role"]:checked').value;
    if (role === 'student') {
        const sid = document.getElementById('student_id').value.trim();
        if (!/^\d{5}$/.test(sid)) {
            e.preventDefault();
            alert('학번은 숫자 5자리로 입력하세요.');
            return;
        }
    }
});
</script>
{% endblock %}
