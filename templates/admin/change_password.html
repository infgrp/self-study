{% extends "base.html" %}
{% block title %}비밀번호 변경{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0">관리자 비밀번호 변경</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">현재 비밀번호</label>
                        <input type="password" name="current_password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">새 비밀번호</label>
                        <input type="password" name="new_password" class="form-control" required>
                        <div class="form-text">8자 이상, 영문 + 숫자 조합</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">새 비밀번호 확인</label>
                        <input type="password" name="confirm_password" class="form-control" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-dark">변경하기</button>
                    </div>
                </form>
            </div>
        </div>
        <div class="text-center mt-3">
            <a href="{{ url_for('admin_bp.dashboard') }}" class="text-secondary">← 대시보드로 돌아가기</a>
        </div>
    </div>
</div>
{% endblock %}
