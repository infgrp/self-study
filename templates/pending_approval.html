{% extends "base.html" %}
{% block title %}승인 대기 중{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="card shadow-sm border-warning">
            <div class="card-body py-5">
                <div class="mb-3" style="font-size: 3rem;">⏳</div>
                <h4 class="card-title text-warning">계정 승인 대기 중</h4>
                <p class="card-text text-muted mt-3">
                    교사 계정은 관리자의 승인 후 사용할 수 있습니다.<br>
                    승인이 완료되면 로그인이 가능합니다.
                </p>
                <p class="card-text">
                    <small class="text-muted">문의: 시스템 관리자에게 연락하세요.</small>
                </p>
                <form method="POST" action="{{ url_for('auth.logout') }}" class="d-inline">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <button type="submit" class="btn btn-outline-secondary mt-3">로그아웃</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
